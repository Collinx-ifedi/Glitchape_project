<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GlitchApe Chat — AI Fashion Designer</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            matte: '#000000',
            surface: '#0A0A0A',
            aqua: '#00F0FF',
            silver: '#9CA3AF'
          },
          fontFamily: {
            display: ['"Space Grotesk"', 'system-ui', 'sans-serif']
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <style>
    :root{
      --bg: #000000;
      --surface: #0A0A0A;
      --accent: #00F0FF;
      --muted: rgba(255,255,255,0.45);
      --rounded: 14px;
    }
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      --viewport-height: 100dvh;
    }
    body{
      font-family: "Space Grotesk", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background:
        radial-gradient(1000px 400px at 10% 8%, rgba(0,240,255,0.02), transparent),
        linear-gradient(180deg, var(--bg), #050505);
      background-attachment: fixed;
      color: rgba(255,255,255,0.94);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      overflow: hidden;
    }

    .glass {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border: 1px solid rgba(255,255,255,0.04);
      backdrop-filter: blur(8px) saturate(1.05);
      border-radius: var(--rounded);
    }

    .btn-glass { 
      padding:.6rem 1rem; 
      border-radius:10px; 
      border:1px solid rgba(255,255,255,0.04); 
      background:transparent; 
      cursor: pointer;
      color: rgba(255,255,255,0.94);
      transition: all 0.2s;
      font-family: inherit;
      font-size: 14px;
      white-space: nowrap;
    }
    .btn-glass:hover {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.1);
    }

    .btn-checkout {
      padding: 0.6rem 1rem;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, var(--accent), rgba(0,240,255,0.7));
      color: #001018;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-checkout:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0,240,255,0.3);
    }
    .btn-checkout:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .spinner { 
      width:16px;height:16px;border:2px solid rgba(255,255,255,0.18);border-top-color:var(--accent);border-radius:50%;display:inline-block;animation:spin .9s linear infinite;margin-right:8px;vertical-align:middle; 
    }
    @keyframes spin{ from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

    .typing-dot { 
      width:8px;height:8px;border-radius:999px;background:var(--accent);opacity:.22;animation: dot 1.2s infinite;display:inline-block;margin-right:6px; 
    }
    .typing-dot:nth-child(2){ animation-delay:.12s; }
    .typing-dot:nth-child(3){ animation-delay:.24s; }
    @keyframes dot { 0%,60%,100%{ transform:translateY(0); opacity:.22 } 30%{ transform:translateY(-6px); opacity:1 } }

    .muted { color: var(--muted); }

    .chat-input-container {
      position: relative;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 0;
    }

    #chatInput {
      flex: 1;
      padding: 12px 16px;
      border-radius: 12px;
      background: #050505;
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.94);
      font-family: inherit;
      font-size: 14px;
      resize: none;
      max-height: 120px;
      min-height: 44px;
      transition: border-color 0.2s, height 0.2s;
      line-height: 1.5;
    }

    #chatInput:focus {
      outline: none;
      border-color: rgba(0,240,255,0.3);
    }

    #sendBtn {
      width: 44px;
      height: 44px;
      min-width: 44px;
      min-height: 44px;
      border-radius: 50%;
      background: linear-gradient(90deg, var(--accent), rgba(0,240,255,0.6));
      color: #001018;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(0,240,255,0.2);
      flex-shrink: 0;
    }

    #sendBtn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,240,255,0.3);
    }

    #sendBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      width: 100%;
      overflow: hidden;
      padding-top: max(0px, env(safe-area-inset-top));
      padding-bottom: env(safe-area-inset-bottom);
    }

    .chat-header {
      flex-shrink: 0;
      padding: 16px 24px;
      padding-top: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 10;
    }

    .chat-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .chat-header-left img {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .chat-header-info {
      min-width: 0;
    }

    .chat-header-info h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-header-info p {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-header-buttons {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      margin-left: 12px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 0;
    }

    .chat-messages::-webkit-scrollbar {
      width: 10px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.02);
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, var(--accent), #00b9c7);
      border-radius: 999px;
    }

    .chat-messages::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #00e6ff, #00d4e3);
    }

    .chat-footer {
      flex-shrink: 0;
      padding: 20px 24px;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    .message-wrapper {
      width: 100%;
      display: flex;
    }

    .message-bubble {
      padding: 12px 16px;
      border-radius: 18px;
      word-wrap: break-word;
      max-width: 70%;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .bubble-user {
      background: rgba(0,240,255,0.15);
      border: 1px solid rgba(0,240,255,0.3);
      color: rgba(255,255,255,0.94);
      margin-left: auto;
    }

    .bubble-ai {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.94);
    }

    .message-bubble img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin-top: 8px;
      display: block;
    }

    #alertContainer {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      animation: slideIn 0.3s ease-out;
    }

    .alert-success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: rgb(134, 239, 172);
    }

    .alert-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: rgb(252, 165, 165);
    }

    .alert-info {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: rgb(147, 197, 253);
    }

    @media (max-width:768px){
      .message-bubble { max-width: 85%; }
      .chat-header-info h2 { font-size: 14px; }
      .chat-header-buttons { gap: 4px; }
      .btn-glass, .btn-checkout {
        padding: 0.5rem 0.8rem;
        font-size: 12px;
      }
    }

    @media (max-width:480px){
      .chat-header {
        padding: 12px 16px;
      }
      .btn-glass, .btn-checkout {
        padding: 0.4rem 0.6rem;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <canvas id="particleCanvas" class="absolute inset-0 pointer-events-none z-0"></canvas>

  <div class="relative z-10 w-full">
    <div class="chat-container">
      <div class="chat-header">
        <div class="chat-header-left">
          <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?auto=format&fit=crop&w=64&q=60" alt="GlitchApe">
          <div class="chat-header-info">
            <h2>GlitchApe Designer</h2>
            <p>Describe what you want — I'll design it.</p>
          </div>
        </div>
        <div class="chat-header-buttons">
          <button id="checkoutBtn" class="btn-checkout" title="Proceed to checkout">Checkout</button>
          <button id="homeBtn" class="btn-glass" title="Return home">Home</button>
        </div>
      </div>

      <div id="chatMessages" class="chat-messages">
        <div class="message-wrapper">
          <div class="message-bubble bubble-ai">Welcome — describe the clothing item you'd like and I'll help design it.</div>
        </div>
      </div>

      <div class="chat-footer">
        <div id="alertContainer"></div>
        <!-- Removed the upload button, chat input now extends full width -->
        <div class="chat-input-container">
          <textarea id="chatInput" placeholder="Describe your design..." rows="1"></textarea>
          <button id="sendBtn" title="Send message" disabled>
            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M2 2l16 8-16 8V2z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://glitchape-by.onrender.com/api';
    const API_SERVER_ROOT = 'https://glitchape-by.onrender.com';
    const state = { authToken: null, currentUser: null, currentSession: null };

    document.addEventListener('DOMContentLoaded', () => {
      hydrateFromLocal();
      setupEventListeners();
      checkInputForSend();
      initParticles();
    });

    function initParticles(){
      const canvas = document.getElementById('particleCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let w = canvas.width = innerWidth, h = canvas.height = innerHeight;
      const particles = [];
      const COUNT = Math.max(24, Math.floor((w*h)/120000));
      function rand(a,b){return Math.random()*(b-a)+a}
      function resize(){ w = canvas.width = innerWidth; h = canvas.height = innerHeight; particles.length=0; for(let i=0;i<COUNT;i++) particles.push({x:rand(0,w),y:rand(0,h),r:rand(.5,2.4),vx:rand(-0.2,0.2),vy:rand(-0.2,0.2),alpha:rand(.02,.12)})}
      resize(); window.addEventListener('resize', resize);
      function draw(){ ctx.clearRect(0,0,w,h); for(const p of particles){ p.x+=p.vx; p.y+=p.vy; if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0; ctx.beginPath(); ctx.fillStyle = `rgba(0,240,255,${p.alpha})`; ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill() } requestAnimationFrame(draw) }
      draw();
    }

    function showAlert(msg, type='info'){ 
      const container = document.getElementById('alertContainer');
      const el = document.createElement('div');
      el.className = 'alert alert-' + type;
      el.textContent = msg;
      container.appendChild(el);
      setTimeout(() => el.remove(), 4500);
    }

    function hydrateFromLocal(){
      const token = localStorage.getItem('authToken');
      if (token){ 
        state.authToken = token;
        try{ state.currentUser = JSON.parse(localStorage.getItem('currentUser')); }catch(e){ state.currentUser=null }
      }
    }

    function autoExpandTextarea() {
      const textarea = document.getElementById('chatInput');
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
    }

    function checkInputForSend() {
      const textarea = document.getElementById('chatInput');
      const sendBtn = document.getElementById('sendBtn');
      const hasText = textarea.value.trim().length > 0;
      sendBtn.disabled = !hasText;
    }

    function setupEventListeners(){
      document.getElementById('checkoutBtn').addEventListener('click', async () => {
        if (!state.currentSession) {
          showAlert('No active design session. Start by describing a design.', 'error');
          return;
        }

        const checkoutBtn = document.getElementById('checkoutBtn');
        checkoutBtn.disabled = true;
        checkoutBtn.textContent = '⏳ Processing...';

        try {
          const response = await fetch(`${API_BASE}/orders/initiate-checkout`, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${state.authToken}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ session_id: state.currentSession })
          });

          if (!response.ok) {
            const errorData = await response.json();
            const errorMsg = errorData.detail || 'Checkout failed. Please ensure order details are complete.';
            showAlert(errorMsg, 'error');
            checkoutBtn.disabled = false;
            checkoutBtn.textContent = '💳 Checkout';
            return;
          }

          const checkoutData = await response.json();
          showAlert('Redirecting to payment...', 'success');
          console.log('[v0] Checkout initiated:', checkoutData);
          addMessageToChat('ai', `Order initiated! Payment Intent ID: ${checkoutData.payment_intent_id}. Total: $${checkoutData.total_cost} ${checkoutData.currency.toUpperCase()}. Integration with Stripe payment form would go here.`);

          checkoutBtn.disabled = false;
          checkoutBtn.textContent = '💳 Checkout';

        } catch (err) {
          console.error('[v0] Checkout error:', err);
          showAlert('Checkout error: ' + (err.message || 'Unknown error'), 'error');
          checkoutBtn.disabled = false;
          checkoutBtn.textContent = '💳 Checkout';
        }
      });

      document.getElementById('homeBtn').addEventListener('click', () => {
        window.location.href = '/';
      });

      document.getElementById('chatInput').addEventListener('input', () => {
        autoExpandTextarea();
        checkInputForSend();
      });

      document.getElementById('chatInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter' && !e.shiftKey){
          e.preventDefault();
          sendMessage();
        }
      });

      document.getElementById('sendBtn').addEventListener('click', sendMessage);
      
      <!-- Removed the upload button event listener -->
    }

    async function startSession(){
      if (!state.authToken) throw new Error('Not authenticated');
      const resp = await fetch(`${API_BASE}/chat/start`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${state.authToken}` }
      });
      if (!resp.ok) throw new Error('Failed to start session');
      const data = await resp.json();
      state.currentSession = data.session_id;
      return data.session_id;
    }

    async function sendMessage(){
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;

      addMessageToChat('user', text);
      input.value = '';
      autoExpandTextarea();
      checkInputForSend();
      showTypingIndicator();

      try {
        if (!state.currentSession) { await startSession(); }
        const fd = new FormData();
        fd.append('prompt', text);
        fd.append('session_id', state.currentSession);

        const resp = await fetch(`${API_BASE}/ai/chat`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${state.authToken}` },
          body: fd
        });

        if (!resp.ok) throw new Error('AI request failed');
        const data = await resp.json();
        removeTypingIndicator();

        await streamAIResponse(data.response_text || 'Got it!');

        if (data.image_urls && data.image_urls.length > 0) {
          for (const imageUrl of data.image_urls) {
            addMessageToChat('ai', '', imageUrl);
          }
        }
      } catch (err) {
        removeTypingIndicator();
        addMessageToChat('ai', 'Sorry — something went wrong. Try again.');
        showAlert('Chat error: ' + (err.message || 'unknown'), 'error');
      }
    }

    function addMessageToChat(role, content, imageUrl = null){
      const messagesDiv = document.getElementById('chatMessages');
      const wrapper = document.createElement('div');
      wrapper.className = 'message-wrapper';

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble ' + (role === 'user' ? 'bubble-user' : 'bubble-ai');

      if (imageUrl) {
        const resolvedUrl = imageUrl.startsWith('http') ? imageUrl : `${API_SERVER_ROOT}${imageUrl}`;
        const img = document.createElement('img');
        img.src = resolvedUrl;
        img.alt = content || 'Design image';
        img.style.display = 'block';
        bubble.appendChild(img);
        if (content) {
          const text = document.createElement('div');
          text.textContent = content;
          bubble.insertBefore(text, img);
        }
      } else {
        bubble.textContent = content;
      }

      wrapper.appendChild(bubble);
      messagesDiv.appendChild(wrapper);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function showTypingIndicator(){
      const messagesDiv = document.getElementById('chatMessages');
      const wrapper = document.createElement('div');
      wrapper.id = 'typingIndicator';
      wrapper.className = 'message-wrapper';

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble bubble-ai flex items-center';
      bubble.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span><span class="muted ml-3">Thinking...</span>';

      wrapper.appendChild(bubble);
      messagesDiv.appendChild(wrapper);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function removeTypingIndicator(){
      const i = document.getElementById('typingIndicator');
      if (i) i.remove();
    }

    async function streamAIResponse(text){
      const messagesDiv = document.getElementById('chatMessages');
      const wrapper = document.createElement('div');
      wrapper.className = 'message-wrapper';

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble bubble-ai';

      wrapper.appendChild(bubble);
      messagesDiv.appendChild(wrapper);

      for (let i = 0; i < text.length; i++) {
        bubble.textContent += text[i];
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        await new Promise(r => setTimeout(r, 8));
      }
    }
  </script>
</body>
</html>
